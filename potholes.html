<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title><h1>Streetlight Reports</h1></title>

<style>

:root{
--bg:#f4f6fb;
--card:#ffffff;
--text:#111;
--primary:#2d6cdf;
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#e5e7eb;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* HEADER */

header{
background:linear-gradient(90deg,#1e3a8a,#2563eb);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.back{
background:white;
border:none;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* GRID */

.container{
padding:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* CARD */

.card{
background:var(--card);
border-radius:14px;
padding:18px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* PRIORITY COLORS */

.priority{
padding:5px 10px;
border-radius:10px;
font-size:12px;
color:white;
}

.high{background:#ff4d4d}
.medium{background:#ffb020}
.low{background:#2ecc71}

/* IMAGE */

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* BUTTONS */

.btns{
margin-top:10px;
}

button.action{
border:none;
padding:7px 10px;
border-radius:8px;
margin-right:6px;
cursor:pointer;
}

.pending{background:#ffb020}
.progress{background:#2d6cdf;color:white}
.resolved{background:#2ecc71;color:white}

</style>

</head>
